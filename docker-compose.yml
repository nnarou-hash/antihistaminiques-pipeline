version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: antihistaminiques_db
    environment:
      POSTGRES_DB: antihistaminiques
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d antihistaminiques"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: antihistaminiques_app
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: antihistaminiques
      DB_USER: pipeline
      DB_PASSWORD: pipeline2026

volumes:
  pgdata:
